name: Owner Approval Gate

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  owner-approval:
    name: owner-approval
    if: github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Verify owner approval
        uses: actions/github-script@v7
        with:
          script: |
            const requiredReviewer = 'minhdptpuzzle';
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const latestStateByUser = new Map();
            const statefulStates = new Set(['APPROVED', 'CHANGES_REQUESTED', 'DISMISSED']);

            for (const review of reviews) {
              const login = review.user?.login?.toLowerCase();
              const state = `${review.state || ''}`.toUpperCase();
              if (!login || !statefulStates.has(state)) continue;
              latestStateByUser.set(login, state);
            }

            const ownerState = latestStateByUser.get(requiredReviewer.toLowerCase());
            if (ownerState !== 'APPROVED') {
              core.setFailed(`PR requires an active approval from @${requiredReviewer}. Current state: ${ownerState || 'NONE'}.`);
              return;
            }

            core.notice(`Active owner approval found from @${requiredReviewer}.`);