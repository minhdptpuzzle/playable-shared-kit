name: Sync to personal repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Clone source repo (bare)
        run: |
          git clone --bare https://x-access-token:${{ secrets.PERSONAL_MIRROR_TOKEN }}@github.com/${{ github.repository }}.git source.git

      - name: Push to personal repo
        env:
          TARGET_REPO: https://x-access-token:${{ secrets.PERSONAL_MIRROR_TOKEN }}@github.com/minhdangphamthe/playable-shared-kit.git
        run: |
          cd source.git
          git push "$TARGET_REPO" '+refs/heads/*:refs/heads/*'
          git push "$TARGET_REPO" '+refs/tags/*:refs/tags/*'